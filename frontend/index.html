// --- [1. 온보딩 플로우] ---
function OnboardingFlow({ onComplete }) {
  const [step, setStep] = useState(1);
  const [schoolInfo, setSchoolInfo] = useState({ school: '', major: '', grade: '', status: '' });
  const [isSchoolFocused, setIsSchoolFocused] = useState(false);
  const [isMajorFocused, setIsMajorFocused] = useState(false);
  const [isGradeOpen, setIsGradeOpen] = useState(false);
  const [isStatusOpen, setIsStatusOpen] = useState(false);
  const [resumeType, setResumeType] = useState('link');
  const [resumeUrl, setResumeUrl] = useState('');
  const [resumeFile, setResumeFile] = useState(null);
  const [selectedCompanies, setSelectedCompanies] = useState([]);
  const [companySearch, setCompanySearch] = useState('');
  const [isCompanyFocused, setIsCompanyFocused] = useState(false);
  const [selectedRoles, setSelectedRoles] = useState([]);
  const [roleSearch, setRoleSearch] = useState('');
  const [isRoleFocused, setIsRoleFocused] = useState(false);
  const [isAnalyzingResume, setIsAnalyzingResume] = useState(false);
  const [hasAnalyzed, setHasAnalyzed] = useState(false);

  const handleNext = () => {
    if (step === 3 && !hasAnalyzed) {
      setIsAnalyzingResume(true);
      setStep(4);
      setTimeout(() => { setIsAnalyzingResume(false); setHasAnalyzed(true); }, 2500);
    } else if (step < 5) {
      setStep(step + 1);
    } else {
      onComplete();
    }
  };

  const addCompany = (company) => {
    if (!selectedCompanies.includes(company)) setSelectedCompanies([...selectedCompanies, company]);
    setCompanySearch(''); setIsCompanyFocused(false);
  };
  const removeCompany = (company) => setSelectedCompanies(selectedCompanies.filter(c => c !== company));

  const addRole = (role) => {
    if (!selectedRoles.includes(role)) setSelectedRoles([...selectedRoles, role]);
    setRoleSearch(''); setIsRoleFocused(false);
  };
  const removeRole = (role) => setSelectedRoles(selectedRoles.filter(r => r !== role));

  const filteredSchools = MOCK_SCHOOLS.filter(s => s.toLowerCase().includes(schoolInfo.school.toLowerCase()) && s !== schoolInfo.school);
  const filteredMajors = MOCK_MAJORS.filter(m => m.toLowerCase().includes(schoolInfo.major.toLowerCase()) && m !== schoolInfo.major);
  const filteredCompanies = ALL_COMPANIES.filter(c => c.toLowerCase().includes(companySearch.toLowerCase()) && !selectedCompanies.includes(c));
  const filteredRoles = ALL_ROLES.filter(r => r.toLowerCase().includes(roleSearch.toLowerCase()) && !selectedRoles.includes(r));

  const isNextDisabled = (step === 1 && (!schoolInfo.school || !schoolInfo.major)) ||
    (step === 2 && (!schoolInfo.status || (schoolInfo.status !== '졸업' && !schoolInfo.grade))) ||
    (step === 3 && ((resumeType === 'link' && !resumeUrl.trim()) || (resumeType === 'file' && !resumeFile))) ||
    (step === 4 && selectedCompanies.length === 0) ||
    (step === 5 && selectedRoles.length === 0);

  return (
    <div className="min-h-screen bg-[#fbfcff] flex flex-col justify-center items-center p-6 font-sans">
      <div className="w-full max-w-[480px] bg-white p-8 md:p-10 rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] relative">
        {!isAnalyzingResume && (
          <div className="w-full bg-slate-100 h-2 rounded-full mb-10 overflow-hidden relative">
            <div className="bg-gradient-to-r from-purple-500 to-indigo-500 h-full rounded-full transition-all duration-700 ease-in-out" style={{ width: `${(step / 5) * 100}%` }} />
          </div>
        )}

        {step === 1 && <OnboardingStep1 schoolInfo={schoolInfo} setSchoolInfo={setSchoolInfo} isSchoolFocused={isSchoolFocused} setIsSchoolFocused={setIsSchoolFocused} isMajorFocused={isMajorFocused} setIsMajorFocused={setIsMajorFocused} filteredSchools={filteredSchools} filteredMajors={filteredMajors} />}
        {step === 2 && <OnboardingStep2 schoolInfo={schoolInfo} setSchoolInfo={setSchoolInfo} isStatusOpen={isStatusOpen} setIsStatusOpen={setIsStatusOpen} isGradeOpen={isGradeOpen} setIsGradeOpen={setIsGradeOpen} />}
        {step === 3 && <OnboardingStep3 resumeType={resumeType} setResumeType={setResumeType} resumeUrl={resumeUrl} setResumeUrl={setResumeUrl} resumeFile={resumeFile} setResumeFile={setResumeFile} />}
        {step === 4 && <OnboardingStep4 isAnalyzingResume={isAnalyzingResume} selectedCompanies={selectedCompanies} removeCompany={removeCompany} companySearch={companySearch} setCompanySearch={setCompanySearch} isCompanyFocused={isCompanyFocused} setIsCompanyFocused={setIsCompanyFocused} filteredCompanies={filteredCompanies} addCompany={addCompany} />}
        {step === 5 && <OnboardingStep5 selectedRoles={selectedRoles} removeRole={removeRole} roleSearch={roleSearch} setRoleSearch={setRoleSearch} isRoleFocused={isRoleFocused} setIsRoleFocused={setIsRoleFocused} filteredRoles={filteredRoles} addRole={addRole} />}

        {!isAnalyzingResume && (
          <div className="mt-8 pt-4 border-t border-slate-100 flex items-center justify-between">
            {step > 1 ? <button onClick={() => setStep(step === 4 ? 3 : step - 1)} className="text-slate-400 hover:text-slate-600 font-medium px-4 py-2 transition-colors">이전으로</button> : <div></div>}
            <button onClick={handleNext} disabled={isNextDisabled}
              className="flex-1 max-w-[200px] bg-slate-800 text-white font-semibold text-[16px] py-4 rounded-2xl hover:bg-slate-900 hover:shadow-lg hover:shadow-slate-800/20 transition-all duration-300 disabled:bg-slate-100 disabled:text-slate-400 disabled:shadow-none flex justify-center items-center gap-2">
              {step === 5 ? <React.Fragment>구글 연동하기 <CalendarCheck size={18} /></React.Fragment> : '다음 단계로'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

      <p className="text-slate-500 mb-8 text-[15px]">맞춤형 교내 공지사항과 정보를 가져오기 위해 필요해요.</p>

// --- [사이드바: 공고 토글] ---
function EventSidebar({ events, hiddenGroups, onToggleGroup, sidebarOpen, onToggleSidebar }) {
  // 메인 공고 이벤트만 추출 (prep 제외, agent 타입 또는 카드뉴스에서 추가된 것)
  const mainEvents = events.filter(e => e.category !== 'prep');
  // 각 메인 이벤트에 연결된 prep 개수 계산
  const getLinkedPrepCount = (eventId) => events.filter(e => e.parentEventId === eventId).length;

  const categoryStyle = {
    job: { bg: 'bg-purple-50', border: 'border-purple-200', dot: 'bg-purple-500', text: 'text-purple-700', label: '채용' },
    school: { bg: 'bg-emerald-50', border: 'border-emerald-200', dot: 'bg-emerald-500', text: 'text-emerald-700', label: '학사' },
  };

  return (
    <React.Fragment>
      {/* 모바일 토글 버튼 */}
      <button onClick={onToggleSidebar}
        className="md:hidden fixed top-[80px] left-2 z-30 w-9 h-9 bg-white border border-slate-200 rounded-xl shadow-md flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-all"
        title="사이드바 토글">
        {sidebarOpen ? <ChevronLeft size={16} /> : <ChevronRight size={16} />}
      </button>

      <div className={`${sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} transition-transform duration-300 ease-in-out
        fixed md:relative z-20 top-0 left-0 h-full md:h-auto
        w-[280px] shrink-0 bg-white border-r border-slate-100 flex flex-col overflow-hidden shadow-lg md:shadow-none`}>
        {/* 헤더 */}
        <div className="p-5 pb-3 border-b border-slate-100 shrink-0">
          <div className="flex items-center justify-between mb-1">
            <h3 className="text-[15px] font-bold text-slate-800 tracking-tight flex items-center gap-2">
              <CalendarCheck size={16} className="text-purple-500" /> 내 공고 목록
            </h3>
            <span className="text-[12px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-md">{mainEvents.length}건</span>
          </div>
          <p className="text-[12px] text-slate-400 font-medium">체크를 해제하면 캘린더에서 숨겨집니다</p>
        </div>

        {/* 공고 리스트 */}
        <div className="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-1.5">
          {mainEvents.length === 0 && (
            <div className="flex flex-col items-center justify-center py-12 text-center">
              <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center mb-3">
                <CalendarIcon size={20} className="text-slate-300" />
              </div>
              <p className="text-[13px] text-slate-400 font-medium">아직 추가된 공고가 없어요</p>
              <p className="text-[12px] text-slate-300 mt-1">카드뉴스에서 공고를 추가해보세요</p>
            </div>
          )}
          {mainEvents.map(ev => {
            const isHidden = hiddenGroups.has(ev.id);
            const style = categoryStyle[ev.category] || categoryStyle.job;
            const prepCount = getLinkedPrepCount(ev.id);
            return (
              <div key={ev.id}
                onClick={() => onToggleGroup(ev.id)}
                className={`group flex items-start gap-3 p-3 rounded-2xl cursor-pointer transition-all duration-200 border
                  ${isHidden
                    ? 'bg-slate-50/50 border-transparent opacity-60 hover:opacity-80'
                    : `${style.bg} ${style.border} hover:shadow-sm`
                  }`}>
                {/* 체크박스 */}
                <div className={`mt-0.5 w-5 h-5 rounded-lg border-2 flex items-center justify-center shrink-0 transition-all duration-200
                  ${isHidden
                    ? 'border-slate-300 bg-white'
                    : `border-purple-400 bg-purple-500`
                  }`}>
                  {!isHidden && <Check size={12} className="text-white" />}
                </div>
                {/* 공고 정보 */}
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 mb-1">
                    <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${isHidden ? 'bg-slate-300' : style.dot}`}></span>
                    <span className={`text-[11px] font-bold ${isHidden ? 'text-slate-400' : style.text}`}>{style.label}</span>
                  </div>
                  <p className={`text-[13px] font-bold leading-snug truncate ${isHidden ? 'text-slate-400 line-through decoration-slate-300' : 'text-slate-700'}`}>
                    {ev.title}
                  </p>
                  <div className="flex items-center gap-2 mt-1.5">
                    <span className={`text-[11px] font-medium ${isHidden ? 'text-slate-300' : 'text-slate-400'}`}>
                      {ev.deadline || `${ev.year}.${String(ev.month+1).padStart(2,'0')}.${String(ev.date).padStart(2,'0')}`}
                    </span>
                    {prepCount > 0 && (

            </div>

      {/* 모바일 오버레이 배경 */}
      {sidebarOpen && (
        <div className="md:hidden fixed inset-0 z-10 bg-black/20 backdrop-blur-sm" onClick={onToggleSidebar}></div>
      )}

}

// --- [2. 메인 워크스페이스] ---
function MainWorkspace({ events, setEvents, onLogout }) {
  const [showCardNews, setShowCardNews] = useState(true);
  const [showSettings, setShowSettings] = useState(false);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [isSearching, setIsSearching] = useState(false);
  const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1));
  const [hiddenGroups, setHiddenGroups] = useState(new Set());
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const handlePrevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
  const handleNextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
  const handleToday = () => setCurrentDate(new Date(2026, 2, 22));

  const handleSearchNow = () => {
    setIsSearching(true);
    setTimeout(() => { setIsSearching(false); setShowCardNews(true); }, 2500);
  };

  const addEventsToCalendar = (newEventsArray) => {
    setEvents([...events, ...newEventsArray]);
  };

  const handleToggleGroup = (eventId) => {
    setHiddenGroups(prev => {
      const next = new Set(prev);
      if (next.has(eventId)) next.delete(eventId);
      else next.add(eventId);
      return next;
    });
  };

  // 숨겨진 공고 그룹에 속한 이벤트를 필터링
  const visibleEvents = events.filter(ev => {
    // prep 이벤트: 부모 공고가 숨겨져 있으면 숨김
    if (ev.parentEventId && hiddenGroups.has(ev.parentEventId)) return false;
    // 메인 공고 이벤트: 자기 자신이 숨겨져 있으면 숨김
    if (ev.category !== 'prep' && hiddenGroups.has(ev.id)) return false;
    return true;
  });

  return (
    <div className="flex h-screen bg-white text-slate-800 font-sans overflow-hidden">
      <EventSidebar
        events={events} hiddenGroups={hiddenGroups} onToggleGroup={handleToggleGroup}
        sidebarOpen={sidebarOpen} onToggleSidebar={() => setSidebarOpen(!sidebarOpen)}
      />
      <div className="flex-1 flex flex-col min-w-0 relative">
        <CalendarHeader
          currentDate={currentDate} onPrev={handlePrevMonth} onNext={handleNextMonth} onToday={handleToday}
          onOpenSettings={() => setShowSettings(true)} onLogout={onLogout} onSearchNow={handleSearchNow}
        />
        <CalendarGrid currentDate={currentDate} events={visibleEvents} onEventClick={(event) => setSelectedEvent(event)} />

        {showCardNews && (
          <CardNewsOverlay onClose={() => setShowCardNews(false)} onAddEvent={addEventsToCalendar} onSearchNow={handleSearchNow} />
        )}

        {selectedEvent && (
          <EventDetailOverlay
            event={selectedEvent} onClose={() => setSelectedEvent(null)}
            onRemove={(id) => { setEvents(events.filter(e => e.id !== id)); setSelectedEvent(null); }}
          />
        )}

        {showSettings && <SettingsModal onClose={() => setShowSettings(false)} />}

        {isSearching && (
          <div className="absolute inset-0 z-50 flex items-center justify-center bg-white/80 backdrop-blur-md animate-fade-in">
            <div className="flex flex-col items-center bg-white p-10 rounded-[32px] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] border border-slate-100">
              <div className="w-20 h-20 relative flex items-center justify-center mb-6">
                <div className="absolute inset-0 rounded-full border-4 border-purple-100"></div>
                <div className="absolute inset-0 rounded-full border-4 border-purple-500 border-t-transparent animate-spin"></div>
                <Bot size={32} className="text-purple-600" />
              </div>
              <h3 className="text-[22px] font-bold text-slate-800 mb-2 tracking-tight">Agent가 일정을 업데이트 중입니다</h3>
              <p className="text-[15px] text-slate-500 text-center leading-relaxed">등록된 이력서와 희망 직무를 분석하여<br/>최적의 기회를 가져오고 있어요...</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// --- [컴포넌트: 캘린더 그리드] ---
function CalendarGrid({ currentDate, events, onEventClick }) {
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();

  const calendarCells = [];
  for (let i = firstDay - 1; i >= 0; i--) calendarCells.push({ date: daysInPrevMonth - i, isCurrentMonth: false, year: month === 0 ? year - 1 : year, month: month === 0 ? 11 : month - 1 });
  for (let i = 1; i <= daysInMonth; i++) calendarCells.push({ date: i, isCurrentMonth: true, year: year, month: month });

  let nextDays = 1;
  while (calendarCells.length < 35) calendarCells.push({ date: nextDays++, isCurrentMonth: false, year: month === 11 ? year + 1 : year, month: month === 11 ? 0 : month + 1 });
  if (calendarCells.length > 35 && calendarCells.length < 42) {
    while (calendarCells.length < 42) calendarCells.push({ date: nextDays++, isCurrentMonth: false, year: month === 11 ? year + 1 : year, month: month === 11 ? 0 : month + 1 });
  }

  const isActualToday = (cellYear, cellMonth, cellDate) => cellYear === 2026 && cellMonth === 2 && cellDate === 22;

  return (
    <div className="flex-1 flex flex-col bg-white overflow-hidden p-4 pt-[72px] md:pt-4">
      <div className="grid grid-cols-7 mb-2">
        {days.map((day, i) => <div key={day} className={`text-center py-2 text-[13px] font-bold ${i === 0 ? 'text-rose-400' : i === 6 ? 'text-blue-400' : 'text-slate-500'}`}>{day}</div>)}
      </div>
      <div className={`flex-1 grid grid-cols-7 ${calendarCells.length > 35 ? 'grid-rows-6' : 'grid-rows-5'} border-t border-l border-slate-100/70 rounded-2xl overflow-hidden`}>
        {calendarCells.map((cell, i) => {
          const isToday = isActualToday(cell.year, cell.month, cell.date);
          const dayEvents = events.filter(e => e.year === cell.year && e.month === cell.month && e.date === cell.date);
          return (
            <div key={i} className={`p-1.5 md:p-2.5 flex flex-col border-b border-r border-slate-100/70 transition-colors ${!cell.isCurrentMonth ? 'bg-slate-50/50' : 'hover:bg-slate-50/30'}`}>
              <div className="flex justify-between items-start mb-2">
                <span className={`text-xs md:text-sm p-1.5 min-w-[28px] text-center rounded-xl font-medium transition-all ${isToday ? 'bg-purple-500 text-white font-bold shadow-md shadow-purple-500/20' : (i % 7 === 0 ? 'text-rose-400' : 'text-slate-700')} ${!cell.isCurrentMonth && !isToday ? 'opacity-40' : ''}`}>
                  {cell.date === 1 && cell.isCurrentMonth ? `${cell.month + 1}월 ${cell.date}일` : cell.date}
                </span>
              </div>
              <div className="flex-1 space-y-1.5 overflow-y-auto custom-scrollbar pr-1">
                {dayEvents.map(ev => {
                  let colorClass = "bg-slate-50 text-slate-600 hover:bg-slate-100 border border-transparent";
                  if (ev.category === 'job') colorClass = "bg-purple-50 text-purple-700 hover:bg-purple-100 border border-purple-200/60";
                  else if (ev.category === 'school') colorClass = "bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200/60";
                  else if (ev.category === 'prep') colorClass = "bg-white text-slate-600 hover:bg-slate-50 border border-slate-300 border-dashed shadow-none opacity-80";
                  return (
                    <div key={ev.id} onClick={() => onEventClick(ev)} className={`text-[11px] md:text-xs px-2 py-1.5 rounded-lg truncate cursor-pointer font-semibold transition-all shadow-sm ${colorClass}`}>
                      {ev.category === 'prep' && <span className="mr-1 text-slate-400">└</span>}
                      {ev.title}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// --- [3. 카드뉴스 오버레이] ---
function CardNewsOverlay({ onClose, onAddEvent, onSearchNow }) {
  const [currentIndex, setCurrentIndex] = useState(0);
  const [isAnimating, setIsAnimating] = useState(false);
  const currentCard = MOCK_RECOMMENDATIONS[currentIndex];

  const handleAction = (type) => {
    if (isAnimating) return;
    setIsAnimating(true);
    if (type === 'add' && currentCard) {
      const dateParts = currentCard.deadline.split('.');
      const deadlineYear = parseInt(dateParts[0]);
      const deadlineMonth = parseInt(dateParts[1]) - 1;
      const deadlineDate = parseInt(dateParts[2]);
      const newEvents = [{
        id: Date.now(), title: `[마감] ${currentCard.title}`,
        year: deadlineYear, month: deadlineMonth, date: deadlineDate,
        type: 'agent', category: currentCard.category, source: currentCard.source,
        url: currentCard.url, relevance: currentCard.relevance,
        strengths: currentCard.strengths, weaknesses: currentCard.weaknesses,
        content: currentCard.content, deadline: currentCard.deadline
      }];
      if (currentCard.actionPlan) {
        currentCard.actionPlan.forEach((plan, idx) => {
          const targetDate = deadlineDate + plan.offsetDays;
          newEvents.push({
            id: Date.now() + idx + 1, title: plan.title,
            year: deadlineYear, month: deadlineMonth,
            date: targetDate > 0 ? targetDate : 1,
            type: 'prep', category: 'prep',
            content: `'${currentCard.title}' 지원을 위해 Agent가 생성한 세부 준비 일정입니다.`,
            parentEventId: newEvents[0].id
          });
        });
      }
      onAddEvent(newEvents);
    }
    setTimeout(() => {
      setIsAnimating(false);
      if (currentIndex < MOCK_RECOMMENDATIONS.length - 1) setCurrentIndex(prev => prev + 1);
      else onClose();
    }, 350);
  };

  return (
    <div className="absolute inset-0 z-50 flex items-center justify-center p-4 pt-10">
      <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-md transition-opacity duration-300" onClick={onClose}></div>
      <div className="relative w-full max-w-[440px] flex flex-col items-center z-10">
        {currentCard ? (
          <div className={`w-full bg-white rounded-[32px] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.2)] overflow-hidden transition-all duration-300 ease-[cubic-bezier(0.25,0.8,0.25,1)] flex flex-col max-h-[85vh] ${isAnimating ? 'scale-95 opacity-0 translate-y-4' : 'scale-100 opacity-100 translate-y-0'}`}>
            <div className="p-6 pb-4 shrink-0 border-b border-slate-100">
              <div className="flex justify-between items-start mb-3">
                <span className="text-[12px] font-bold text-purple-600 bg-purple-50 px-2.5 py-1 rounded-lg tracking-wide border border-purple-100/50">{currentCard.source}</span>
                <div className="bg-amber-50 px-2.5 py-1 rounded-lg text-[12px] font-bold text-amber-600 flex items-center border border-amber-100/50">
                  <Zap size={14} className="mr-1 fill-amber-500" /> AI 매칭률 {currentCard.relevance}%
                </div>
              </div>
              <h3 className="text-[22px] font-bold text-slate-800 leading-snug tracking-tight mb-1">{currentCard.title}</h3>
              {currentCard.url && (
                <a href={currentCard.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-[12px] font-bold text-slate-400 hover:text-purple-600 transition-colors">
                  <ExternalLink size={12} /> 채용 공고 원문 보기
                </a>
              )}
            </div>
            <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
              <p className="text-slate-600 text-[14px] leading-relaxed mb-6 font-medium bg-slate-50 p-4 rounded-2xl">{currentCard.content}</p>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                <div className="bg-emerald-50/50 border border-emerald-100 rounded-2xl p-4">
                  <h4 className="text-emerald-700 font-bold text-[13px] flex items-center mb-2.5"><CheckCircle2 size={16} className="mr-1.5" /> 이력서 강점 (Fit)</h4>
                  <ul className="text-[13px] text-slate-600 space-y-1.5 leading-relaxed font-medium">

                  <CalendarCheck size={18} /> 캘린더에 일괄 추가

            <div className="w-20 h-20 bg-emerald-50 rounded-[24px] flex items-center justify-center mx-auto mb-6"><Check size={40} className="text-emerald-500" /></div>
            <h3 className="text-[22px] font-bold text-slate-800 mb-3 tracking-tight">모두 확인했어요!</h3>
            <p className="text-slate-500 text-[15px] mb-8 leading-relaxed">준비된 추천 공고를 모두 살펴보셨네요.<br/>지금 바로 새로운 공고를 찾아볼까요?</p>
            <button onClick={() => { onClose(); setTimeout(onSearchNow, 150); }} className="w-full py-4 bg-slate-800 text-white rounded-[20px] font-bold flex justify-center items-center gap-2 hover:bg-slate-900 transition-colors shadow-lg shadow-slate-800/20">
              <Search size={18} /> 일정 업데이트 실행

            <button onClick={onClose} className="mt-6 text-[15px] font-semibold text-slate-400 hover:text-slate-600 transition-colors">닫기</button>
          </div>
        )}
      </div>

          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="absolute inset-0 z-50 flex items-center justify-center p-4 pt-10">
      <div className={`absolute inset-0 bg-slate-900/30 backdrop-blur-sm transition-opacity duration-300 ${isAnimating ? 'opacity-0' : 'opacity-100'}`} onClick={handleClose}></div>
      <div className={`relative w-full max-w-[440px] flex flex-col items-center z-10 transition-all duration-300 ease-[cubic-bezier(0.25,0.8,0.25,1)] ${isAnimating ? 'scale-95 opacity-0 translate-y-4' : 'scale-100 opacity-100 translate-y-0'}`}>
        <div className="w-full bg-white rounded-[32px] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.2)] overflow-hidden flex flex-col max-h-[85vh]">
          <div className="p-6 pb-4 shrink-0 border-b border-slate-100">
            <div className="flex justify-between items-start mb-3">
              <div className="flex gap-2">
                <span className="text-[12px] font-bold text-slate-500 bg-slate-100 px-2.5 py-1 rounded-lg tracking-wide border border-slate-200/50 flex items-center gap-1.5"><CalendarCheck size={14} /> 일정 상세</span>
                <span className="text-[12px] font-bold text-purple-600 bg-purple-50 px-2.5 py-1 rounded-lg tracking-wide border border-purple-100/50">{event.source || 'Agent'}</span>
              </div>
              {event.relevance && <div className="bg-amber-50 px-2.5 py-1 rounded-lg text-[12px] font-bold text-amber-600 flex items-center border border-amber-100/50"><Zap size={14} className="mr-1 fill-amber-500" /> 매칭률 {event.relevance}%</div>}
            </div>
            <h3 className="text-[22px] font-bold text-slate-800 leading-snug tracking-tight mb-1">{event.title}</h3>
            {event.url && <a href={event.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-[12px] font-bold text-slate-400 hover:text-purple-600 transition-colors"><ExternalLink size={12} /> 공고 원문 보기</a>}
          </div>
          <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
            <p className="text-slate-600 text-[14px] leading-relaxed mb-6 font-medium bg-slate-50 p-4 rounded-2xl">{event.content || "상세 내용이 없습니다."}</p>
            {(event.strengths || event.weaknesses) && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                {event.strengths && (
                  <div className="bg-emerald-50/50 border border-emerald-100 rounded-2xl p-4">
                    <h4 className="text-emerald-700 font-bold text-[13px] flex items-center mb-2.5"><CheckCircle2 size={16} className="mr-1.5" /> 이력서 강점 (Fit)</h4>
                    <ul className="text-[13px] text-slate-600 space-y-1.5 leading-relaxed font-medium">{event.strengths.map((s, i) => <li key={i} className="flex items-start"><span className="mr-1.5 mt-0.5 text-emerald-400">•</span> <span>{s}</span></li>)}</ul>
                  </div>
                )}
                {event.weaknesses && (
                  <div className="bg-rose-50/50 border border-rose-100 rounded-2xl p-4">
                    <h4 className="text-rose-700 font-bold text-[13px] flex items-center mb-2.5"><AlertTriangle size={16} className="mr-1.5" /> 보완 필요사항</h4>
                    <ul className="text-[13px] text-slate-600 space-y-1.5 leading-relaxed font-medium">{event.weaknesses.map((w, i) => <li key={i} className="flex items-start"><span className="mr-1.5 mt-0.5 text-rose-400">•</span> <span>{w}</span></li>)}</ul>
                  </div>
                )}
              </div>
            )}
            <div className="flex items-center justify-between bg-slate-50 p-4 rounded-xl border border-slate-100">
              <div className="flex items-center gap-2"><CalendarIcon size={16} className="text-slate-400" /><span className="text-sm text-slate-500 font-bold">마감일</span></div>
              <span className="text-[16px] font-bold text-rose-500">{event.deadline || `${event.year}.${String(event.month+1).padStart(2, '0')}.${String(event.date).padStart(2, '0')}`}</span>
            </div>
          </div>
          <div className="px-6 pb-6 pt-2 shrink-0 bg-white flex gap-3">
            <button onClick={() => onRemove(event.id)} className="flex-[0.8] py-4 bg-rose-50 text-rose-600 font-bold rounded-[20px] hover:bg-rose-100 transition-colors">공고 삭제</button>
            <button onClick={handleClose} className="flex-[1.2] py-4 bg-slate-800 text-white font-bold rounded-[20px] hover:bg-slate-900 transition-all shadow-md shadow-slate-800/20">확인 완료</button>
          </div>
        </div>
        <button onClick={handleClose} className="mt-6 w-12 h-12 bg-white/20 hover:bg-white/40 rounded-full flex items-center justify-center text-white backdrop-blur-md transition-colors border border-white/30"><X size={24} /></button>
      </div>
    </div>
  );
}

function App() {
  const [appState, setAppState] = useState('onboarding');
  const [events, setEvents] = useState(MOCK_EVENTS);

  const handleLogout = () => { setAppState('onboarding'); };

  if (appState === 'onboarding') {
    return <OnboardingFlow onComplete={() => setAppState('main')} />;
  }
  return <MainWorkspace events={events} setEvents={setEvents} onLogout={handleLogout} />;
}
